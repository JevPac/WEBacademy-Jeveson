name: Multiplos Jobs Encadeados

on:
  push:

jobs:
  job-info-sistema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Exibir data e hora da execução
        run: date

      - name: Exibir versão do Git
        run: git --version

  job-validar-arquivos:
    runs-on: ubuntu-latest
    needs: job-info-sistema
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar se README.md existe
        run: |
          if [ -f "README.md" ]; then echo "README OK"; else exit 1; fi

      - name: Verificar se LICENSE existe
        run: |
          if [ -f "LICENSE" ]; then echo "LICENSE OK"; else exit 1; fi

      - name: Verificar se .gitignore existe
        run: |
          if [ -f ".gitignore" ]; then echo "GITIGNORE OK"; else exit 1; fi
